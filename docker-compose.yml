version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:3000" # Maps the standard web port (80) to the container's 3000 port
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # MAKE SURE TO FILL THESE IN ON THE SERVER BEFORE RUNNING!
      # - GEMINI_API_KEY=your_key_here
      # - ELEVENLABS_API_KEY=your_key_here
